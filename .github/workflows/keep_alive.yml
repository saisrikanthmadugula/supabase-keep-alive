name: Supabase Keep-Alive Master

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Woxpa Database
        # Uses your updated secret (with %24 for $)
        run: |
          psql "${{ secrets.WOXPA_DB_URL }}" -c "SELECT 1;"

  keep_gh_action_active:
    runs-on: ubuntu-latest
    # THIS SECTION IS THE FIX:
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Using the persistent token to ensure push rights
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Manual Activity Heartbeat
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          echo "Last heartbeat: $(date)" > heartbeat.txt
          git add heartbeat.txt
          # Only push if there's a change to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update heartbeat [skip ci]" && git push)
