name: Supabase Keep-Alive Master

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Woxpa Database
        run: |
          psql "${{ secrets.WOXPA_DB_URL }}" -c "SELECT 1;"

  keep_gh_action_active:
    runs-on: ubuntu-latest
    # THIS BLOCK IS CRITICAL
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This ensures the token is persisted for the push step
          persist-credentials: true
      
      - name: Manual Activity Heartbeat
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          echo "Last heartbeat: $(date)" > heartbeat.txt
          git add heartbeat.txt
          # Only push if there are changes to avoid error
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update heartbeat [skip ci]" && git push)
