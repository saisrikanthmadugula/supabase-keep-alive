name: Supabase Keep-Alive Master

on:
  schedule:
    # Runs at 00:00 every 3rd day to stay ahead of the 7-day pause
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows you to test manually

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ping Woxpa Database
        # Ensure your secret WOXPA_DB_URL uses %24 instead of $
        run: |
          psql "${{ secrets.WOXPA_DB_URL }}" -c "SELECT 1;"

  keep_gh_action_active:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the heartbeat commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Manual Activity Heartbeat
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          echo "Last successful heartbeat: $(date)" > heartbeat.txt
          git add heartbeat.txt
          # Only commit if there are changes to avoid empty error
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update heartbeat [skip ci]" && git push)
